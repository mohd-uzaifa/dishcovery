<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Dishes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">DishCovery</div>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../ingredient-search/index.html">Ingredients</a></li>
    <li><a href="index.html">Regions</a></li>
    <li><a href="../meal-planner/index.html">Meal Planner</a></li>
    <li><a href="../favorites/index.html">Favorites</a></li>
  </ul>
</nav>

<!-- Hero -->
<header class="hero">
  <div class="hero-content">
    <h1>Explore Regional Dishes</h1>
    <p>Discover traditional recipes from every corner of India</p>
  </div>
</header>

<main class="container">

  <!-- Cuisine Buttons -->
  <section class="cuisine-buttons">
    <button data-cuisine="gujarati">Gujarati</button>
    <button data-cuisine="punjabi">Punjabi</button>
    <button data-cuisine="kerala">Kerala</button>
    <button data-cuisine="maharashtrian">Maharashtrian</button>
    <button data-cuisine="rajasthani">Rajasthani</button>
    <button data-cuisine="bengali">Bengali</button>
  </section>

  <!-- Recipes Container -->
  <section class="recipes-container">
    <div id="spinner" class="spinner" style="display:none;"></div>
    <div class="recipe-grid" id="recipeGrid">
      <p class="start-message">Select a region to see dishes</p>
    </div>
    <div class="load-more-wrapper">
      <button id="loadMore" style="display:none;">Load More</button>
    </div>
  </section>

</main>

<!-- Modal -->
<div class="modal" id="recipeModal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <img class="modal-img" id="modalImage" src="" alt="Recipe Image">
    <h2 id="modalName"></h2>
    <p id="modalDescription"></p>
    <div class="modal-section">
      <h3>Ingredients</h3>
      <ul id="modalIngredients"></ul>
    </div>
    <div class="modal-section">
      <h3>Steps</h3>
      <ol id="modalSteps"></ol>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
