<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search by Ingredients</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">DishCovery</div>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../ingredient-search/index.html">Ingredients</a></li>
    <li><a href="../regional-dishes/index.html">Regions</a></li>
    <li><a href="../meal-planner/index.html">Meal Planner</a></li>
    <li><a href="../favorites/index.html">Favorites</a></li>
  </ul>
</nav>

<div class="container">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="top-left">
      <h2>PANTRY</h2>
      <p>You have <span id="ingredientCount">0</span> ingredients</p>
      <input type="text" id="ingredientSearch" placeholder="Type ingredient and press Enter">
    </div>
    <div class="bottom-left">

      <!-- Diet Type Section -->
      <div class="section" id="diet">
        <h3>Diet Type</h3>
        <div class="items"></div>
      </div>

      <!-- Meal Type Section -->
      <div class="section" id="course">
        <h3>Meal Type</h3>
        <div class="items"></div>
      </div>

      <!-- Pantry Sections -->
      <div class="section" id="pantry-essentials">
        <h3>Pantry Essentials</h3>
        <div class="items"></div>
      </div>
      <div class="section" id="vegetables">
        <h3>Vegetables</h3>
        <div class="items"></div>
      </div>
      <div class="section" id="dairy">
        <h3>Dairy</h3>
        <div class="items"></div>
      </div>
      <div class="section" id="spices">
        <h3>Spices</h3>
        <div class="items"></div>
      </div>

    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="top-right">
      <input type="text" id="recipeSearch" placeholder="Search recipes">
    </div>

    <div class="selected-ingredients" id="selectedIngredients"></div>

    <div class="recipes-container">
      <div class="spinner" id="spinner" style="display:none;"></div>
      <div class="recipe-grid empty" id="recipeGrid">
        <p id="startMessage">Enter your ingredients to get started</p>
      </div>
      <div class="load-more-wrapper">
        <button id="loadMore" style="display:none;">Load More</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="recipeModal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <img class="modal-img" id="modalImage" src="" alt="Recipe Image">
    <h2 id="modalName"></h2>
    <p id="modalDescription"></p>

    <div class="modal-section">
      <h3>Ingredients:</h3>
      <ul id="modalIngredients"></ul>
    </div>

    <div class="modal-section">
      <h3>Steps:</h3>
      <ol id="modalSteps"></ol>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
